<app-navbar
  [email]="auth.currentUser.email"
  [firstName]="auth.currentUser.firstName"
  [path]="'home'"
></app-navbar>

<section class="update-shell px-4 py-5 sm:px-6 lg:px-8">
  <div class="mx-auto flex w-full max-w-5xl flex-col gap-5">
    <div
      class="rounded-[28px] border border-emerald-100 bg-white/95 px-4 py-5 shadow-[0_26px_80px_-52px_rgba(5,150,105,0.55)] backdrop-blur sm:px-6"
    >
      <div class="space-y-2 text-center">
        <span class="update-kicker">Mise à jour</span>
        <h1 class="text-2xl font-semibold tracking-tight text-slate-900 sm:text-3xl">
          Mettre à jour les informations de {{ client.firstName }} {{ client.lastName }}
        </h1>
      </div>
    </div>

    <div class="update-card p-4 sm:p-6">
      <div class="mb-5 flex items-center justify-between">
        <div>
          <h2 class="text-lg font-semibold text-slate-900 sm:text-xl">
            Informations du client
          </h2>
          <p class="mt-1 text-sm text-slate-500">
            Modifiez uniquement les champs nécessaires.
          </p>
        </div>
        <span class="update-step">Édition</span>
      </div>

      <div class="grid gap-4 sm:grid-cols-2">
        <label class="space-y-2">
          <span class="update-label">Nom</span>
          <input
            [disabled]="!auth.isAdmin"
            [(ngModel)]="client.firstName"
            type="text"
            id="firstName"
            class="update-input"
            [placeholder]="client.firstName"
          />
        </label>

        <label class="space-y-2">
          <span class="update-label">Postnom</span>
          <input
            [disabled]="!auth.isAdmin"
            [(ngModel)]="client.lastName"
            type="text"
            id="lastName"
            class="update-input"
            [placeholder]="client.lastName"
          />
        </label>

        <label class="space-y-2" *ngIf="client.middleName !== undefined">
          <span class="update-label">Prénom</span>
          <input
            [disabled]="!auth.isAdmin"
            [(ngModel)]="client.middleName"
            type="text"
            id="middleName"
            class="update-input"
            [placeholder]="client.middleName"
          />
        </label>

        <label class="space-y-2" *ngIf="client.middleName === undefined">
          <span class="update-label">Prénom</span>
          <input
            [disabled]="!auth.isAdmin"
            [(ngModel)]="middleName"
            type="text"
            id="middleNameFallback"
            class="update-input"
            [placeholder]="middleName"
          />
        </label>

        <label class="space-y-2">
          <span class="update-label">Numéro de téléphone</span>
          <input
            [disabled]="!auth.isAdmin"
            [(ngModel)]="client.phoneNumber"
            type="text"
            id="phoneNumber"
            class="update-input"
            [placeholder]="client.phoneNumber"
          />
        </label>

        <label class="space-y-2 sm:col-span-2">
          <span class="update-label">Adresse du business</span>
          <input
            [(ngModel)]="client.businessAddress"
            type="text"
            id="businessAddress"
            class="update-input"
            [placeholder]="client.businessAddress"
          />
        </label>

        <label class="space-y-2 sm:col-span-2">
          <span class="update-label">Adresse domicile</span>
          <input
            [(ngModel)]="client.homeAddress"
            type="text"
            id="homeAddress"
            class="update-input"
            [placeholder]="client.homeAddress"
          />
        </label>

        <label class="space-y-2">
          <span class="update-label">Profession</span>
          <input
            [(ngModel)]="client.profession"
            type="text"
            id="profession"
            class="update-input"
            [placeholder]="client.profession"
          />
        </label>

        <label class="space-y-2">
          <span class="update-label text-red-700">Jour de paiement</span>
          <select
            [disabled]="!auth.isAdmin"
            id="paymentDay"
            [(ngModel)]="client.paymentDay"
            class="update-input"
          >
            <option selected>Choisir</option>
            <option [ngValue]="'Monday'">Lundi</option>
            <option [ngValue]="'Tuesday'">Mardi</option>
            <option [ngValue]="'Wednesday'">Mercredi</option>
            <option [ngValue]="'Thursday'">Jeudi</option>
            <option [ngValue]="'Friday'">Vendredi</option>
            <option [ngValue]="'Saturday'">Samedi</option>
          </select>
        </label>

        <label *ngIf="auth.isAdmin" class="space-y-2">
          <span class="update-label text-red-700">État vital</span>
          <select
            [disabled]="!auth.isAdmin"
            id="vitalStatus"
            [(ngModel)]="client.vitalStatus"
            class="update-input"
          >
            <option selected>Choisir</option>
            <option [ngValue]="'Mort'">Mort</option>
            <option [ngValue]="'Vivant'">Vivant</option>
            <option [ngValue]="'Quitté'">Quitté</option>
          </select>
        </label>

        <label class="space-y-2" [class.sm:col-span-2]="!auth.isAdmin">
          <span class="update-label text-red-700">Agent</span>
          <select
            [disabled]="!auth.isAdmin"
            id="agent"
            [(ngModel)]="client.agent"
            class="update-input"
          >
            <option selected>Choisir</option>
            <option *ngFor="let em of employees" [ngValue]="em.uid">
              {{ em.firstName }} {{ em.middleName }} {{ em.lastName }}
            </option>
          </select>
        </label>
      </div>

      <div class="update-actions mt-6">
        <p class="text-sm leading-6 text-slate-500 sm:max-w-xl">
          Vérifiez les champs modifiés avant d’enregistrer.
        </p>
        <div class="flex flex-col gap-3 sm:flex-row">
          <a
            [routerLink]="['/client-portal', id]"
            class="update-cancel-button"
          >
            Annuler
          </a>
          <button
            (click)="updateClientInfo()"
            class="update-primary-button"
          >
            Soumettre
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
