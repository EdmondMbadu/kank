<app-navbar
  [email]="this.auth.currentUser.email"
  [firstName]="this.auth.currentUser.firstName"
  [path]="'home'"
></app-navbar>

<main class="min-h-screen bg-slate-50 px-4 py-6 text-slate-900 dark:bg-slate-950 dark:text-white">
  <section class="mx-auto max-w-7xl">
    <header class="grid items-center gap-4 rounded-3xl bg-gradient-to-br from-emerald-600 to-cyan-700 p-6 text-white md:grid-cols-[auto_1fr_auto]">
      <button
        type="button"
        [routerLink]="backLink"
        class="inline-flex items-center gap-2 rounded-full border border-white/30 px-4 py-2 text-sm font-semibold text-white transition hover:bg-white/15 focus:outline-none focus:ring-4 focus:ring-white/30"
      >
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Retour
      </button>

      <div class="flex min-w-0 items-center gap-4">
        <img
          *ngIf="ownerProfilePictureUrl; else ownerInitialsAvatar"
          [src]="ownerProfilePictureUrl"
          [alt]="'Photo de ' + ownerName"
          class="h-20 w-20 shrink-0 rounded-full border-4 border-white/30 object-cover shadow-lg"
          decoding="async"
        />
        <ng-template #ownerInitialsAvatar>
        <div class="flex h-20 w-20 shrink-0 items-center justify-center rounded-full border-4 border-white/20 bg-white/20 text-2xl font-black shadow-lg">
          {{ ownerInitials }}
        </div>
        </ng-template>
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.18em] text-white/70">
            Galerie photos
          </p>
          <h1 class="text-3xl font-extrabold tracking-tight sm:text-5xl">
            {{ ownerName }}
          </h1>
          <p class="mt-2 max-w-2xl text-sm font-medium text-white/80 sm:text-base">
            {{ ownerAddress }}
          </p>
        </div>
      </div>

      <div class="space-y-2">
        <label
          for="galleryUpload"
          class="inline-flex cursor-pointer items-center justify-center gap-2 rounded-full bg-white px-5 py-3 text-sm font-bold text-slate-900 shadow-lg transition hover:bg-emerald-50 focus-within:ring-4 focus-within:ring-white/30"
        >
          <svg class="h-5 w-5 text-emerald-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m7-7H5" />
          </svg>
          {{ isUploading ? 'Ajout...' : 'Ajouter photo' }}
          <input
            id="galleryUpload"
            type="file"
            accept="image/*"
            class="hidden"
            [disabled]="isUploading"
            (change)="uploadPicture($any($event.target).files)"
          />
        </label>

        <label
          *ngIf="auth.isAdmin"
          class="block rounded-2xl bg-white/10 p-3 text-xs font-semibold text-white"
        >
          <span class="mb-1 block">Date capturée</span>
          <input
            type="datetime-local"
            class="w-full rounded-lg border border-white/20 bg-white px-3 py-2 text-sm font-semibold text-slate-800"
            [ngModel]="uploadCaptureLocal"
            (ngModelChange)="onUploadCaptureInput($event)"
          />
        </label>
      </div>
    </header>

    <p *ngIf="uploadError" class="mx-auto mt-4 max-w-7xl rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700">
      {{ uploadError }}
    </p>

    <nav
      class="mt-5 grid grid-cols-4 gap-1 rounded-2xl border border-slate-200 bg-white p-1.5 shadow-sm dark:border-slate-800 dark:bg-slate-900"
      aria-label="Catégories de photos"
    >
      <button
        *ngFor="let category of filterCategories"
        type="button"
        class="flex min-h-12 items-center justify-center gap-1.5 rounded-xl px-1.5 py-2 text-center transition sm:gap-2 sm:px-3"
        [ngClass]="
          activeCategory === category.id
            ? 'bg-emerald-600 text-white shadow-sm'
            : 'bg-transparent text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800'
        "
        [attr.aria-label]="category.label + ' - ' + category.caption"
        [title]="category.caption"
        (click)="setActiveCategory(category.id)"
      >
        <span
          class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-full"
          [ngClass]="
            activeCategory === category.id
              ? 'bg-white/20 text-white'
              : category.id === 'trophy'
              ? 'bg-amber-100 text-amber-700'
              : category.id === 'domicile'
              ? 'bg-emerald-100 text-emerald-700'
              : 'bg-sky-100 text-sky-700'
          "
        >
          <ng-container [ngSwitch]="category.id">
            <svg
              *ngSwitchCase="'all'"
              class="h-5 w-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 5h6v6H4V5zM14 5h6v6h-6V5zM4 15h6v4H4v-4zM14 15h6v4h-6v-4z"
              />
            </svg>
            <svg
              *ngSwitchCase="'domicile'"
              class="h-5 w-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 11l9-8 9 8"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M5 10v10h14V10M9 20v-6h6v6"
              />
            </svg>
            <svg
              *ngSwitchCase="'trophy'"
              class="h-6 w-6"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8 4h8v3a4 4 0 01-8 0V4z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8 6H5a3 3 0 003 3M16 6h3a3 3 0 01-3 3M12 11v5M9 20h6M10 16h4"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M10 4l2-2 2 2"
              />
            </svg>
            <svg
              *ngSwitchDefault
              class="h-5 w-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 7h6l2 2h8v9a2 2 0 01-2 2H6a2 2 0 01-2-2V7z"
              />
            </svg>
          </ng-container>
        </span>
        <span class="flex min-w-0 items-center gap-1.5 text-xs font-extrabold leading-none sm:text-sm">
          <span class="truncate">{{ category.label }}</span>
          <span
            class="inline-flex h-5 min-w-5 shrink-0 items-center justify-center rounded-full px-1.5 text-[11px] font-black"
            [ngClass]="
              activeCategory === category.id
                ? 'bg-white text-emerald-700'
                : 'bg-slate-900 text-white dark:bg-slate-700'
            "
          >
            {{ countFor(category.id) }}
          </span>
        </span>
      </button>
    </nav>

    <section class="mt-6">
      <div *ngIf="activePictures.length > 0; else emptyGallery" class="grid grid-cols-2 gap-2 sm:grid-cols-3 lg:grid-cols-5">
        <article
          *ngFor="let picture of activePictures; trackBy: trackByPictureId"
          class="relative aspect-square overflow-hidden rounded-xl bg-slate-200"
        >
          <button
            type="button"
            class="h-full w-full"
            (click)="openPicture(picture)"
          >
            <img
              [src]="picture.url"
              [alt]="categoryLabel(picture.category) + ' - ' + ownerName"
              class="h-full w-full object-cover"
              loading="lazy"
              decoding="async"
            />
          </button>
          <div class="absolute bottom-2 left-2 max-w-[calc(100%-1rem)] rounded-lg bg-slate-900/75 px-2 py-1 text-[10px] font-bold leading-tight text-white">
            <p>Ajout: {{ formatPictureDate(picture.uploadedAt) }}</p>
            <p>Capture: {{ formatPictureDate(picture.captureTimeOriginalISO) }}</p>
          </div>
          <label class="absolute right-2 top-2 max-w-[calc(100%-1rem)] rounded-full bg-slate-900/75">
            <span class="sr-only">Reclasser la photo</span>
            <select
              class="max-w-28 border-0 bg-transparent px-2 py-1 text-xs font-extrabold text-white"
              [value]="picture.category"
              [disabled]="reclassifyingPictureId === picture.id"
              (change)="reclassifyPicture(picture, $any($event.target).value)"
            >
              <option
                *ngFor="let category of categories"
                [value]="category.id"
              >
                {{ category.label }}
              </option>
            </select>
          </label>

          <div
            *ngIf="auth.isAdmin && editingCapturePictureId !== picture.id"
            class="absolute right-2 bottom-2 flex items-center gap-1"
          >
            <button
              type="button"
              class="rounded-full bg-white/90 px-2 py-1 text-[11px] font-black text-slate-800 shadow transition hover:bg-white"
              (click)="$event.stopPropagation(); startEditingCaptureTime(picture)"
            >
              Date
            </button>
            <button
              type="button"
              class="rounded-full bg-red-600/95 px-2 py-1 text-[11px] font-black text-white shadow transition hover:bg-red-700 disabled:cursor-wait disabled:opacity-70"
              [disabled]="deletingPictureId === picture.id"
              (click)="deletePicture(picture, $event)"
            >
              {{ deletingPictureId === picture.id ? '...' : 'Supprimer' }}
            </button>
          </div>

          <div
            *ngIf="auth.isAdmin && editingCapturePictureId === picture.id"
            class="absolute inset-x-2 bottom-2 rounded-xl bg-white p-2 text-slate-900 shadow-xl"
          >
            <label class="block text-[10px] font-black uppercase text-slate-500">
              Date capturée
            </label>
            <input
              type="datetime-local"
              class="mt-1 w-full rounded border border-slate-300 px-2 py-1 text-xs font-semibold"
              [(ngModel)]="captureDraftLocal"
            />
            <div class="mt-2 flex justify-end gap-1">
              <button
                type="button"
                class="rounded px-2 py-1 text-[11px] font-bold text-slate-600"
                (click)="cancelEditingCaptureTime()"
              >
                Annuler
              </button>
              <button
                type="button"
                class="rounded bg-emerald-600 px-2 py-1 text-[11px] font-bold text-white"
                (click)="savePictureCaptureTime(picture)"
              >
                OK
              </button>
            </div>
          </div>
        </article>
      </div>

      <ng-template #emptyGallery>
        <div class="flex min-h-72 flex-col items-center justify-center rounded-2xl border border-dashed border-slate-300 bg-white text-slate-700 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100">
          <div class="mb-3 flex h-16 w-16 items-center justify-center rounded-full bg-emerald-50 text-emerald-700">
            <svg class="h-10 w-10" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5V8a2 2 0 012-2h3l1.6-2h4.8L16 6h3a2 2 0 012 2v8.5A2.5 2.5 0 0118.5 19h-13A2.5 2.5 0 013 16.5z" />
              <circle cx="12" cy="12" r="3.2" />
            </svg>
          </div>
          <h2 class="text-xl font-bold">Aucune photo {{ activeCategoryLabel() }}</h2>
        </div>
      </ng-template>
    </section>
  </section>
</main>

<div
  *ngIf="selectedPicture"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/85 p-4"
  (click)="closePicture()"
>
  <button
    *ngIf="canNavigateSelectedPicture"
    type="button"
    class="absolute left-3 top-1/2 z-10 flex h-12 w-12 -translate-y-1/2 items-center justify-center rounded-full bg-white/15 text-white transition hover:bg-white/25 focus:outline-none focus:ring-4 focus:ring-white/30 sm:left-6 sm:h-14 sm:w-14"
    aria-label="Photo précédente"
    (click)="showPreviousPicture($event)"
  >
    <svg class="h-7 w-7" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
  </button>

  <img
    [src]="selectedPicture.url"
    alt="Photo du client"
    class="max-h-[90vh] max-w-[94vw] rounded-xl object-contain shadow-2xl"
    decoding="async"
    (click)="$event.stopPropagation()"
  />

  <button
    *ngIf="auth.isAdmin"
    type="button"
    class="absolute left-5 top-5 rounded-full bg-red-600/90 px-4 py-2 text-sm font-black text-white shadow-lg transition hover:bg-red-700 disabled:cursor-wait disabled:opacity-70"
    [disabled]="deletingPictureId === selectedPicture.id"
    (click)="deletePicture(selectedPicture, $event)"
  >
    {{ deletingPictureId === selectedPicture.id ? 'Suppression...' : 'Supprimer' }}
  </button>

  <button
    *ngIf="canNavigateSelectedPicture"
    type="button"
    class="absolute right-3 top-1/2 z-10 flex h-12 w-12 -translate-y-1/2 items-center justify-center rounded-full bg-white/15 text-white transition hover:bg-white/25 focus:outline-none focus:ring-4 focus:ring-white/30 sm:right-6 sm:h-14 sm:w-14"
    aria-label="Photo suivante"
    (click)="showNextPicture($event)"
  >
    <svg class="h-7 w-7" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
  </button>

  <div
    *ngIf="canNavigateSelectedPicture"
    class="absolute bottom-5 left-1/2 -translate-x-1/2 rounded-full bg-black/50 px-3 py-1 text-xs font-bold text-white"
    (click)="$event.stopPropagation()"
  >
    {{ selectedPicturePositionLabel }}
  </div>

  <button
    type="button"
    class="absolute right-5 top-5 flex h-11 w-11 items-center justify-center rounded-full bg-white/15 text-3xl font-bold text-white transition hover:bg-white/25"
    aria-label="Fermer"
    (click)="closePicture()"
  >
    &times;
  </button>
</div>
