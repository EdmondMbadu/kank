<app-navbar
  [email]="this.auth.currentUser.email"
  [firstName]="this.auth.currentUser.firstName"
  [path]="'home'"
></app-navbar>

<main class="min-h-screen bg-slate-50 px-4 py-6 text-slate-900 dark:bg-slate-950 dark:text-white">
  <section class="mx-auto max-w-7xl">
    <header class="grid items-center gap-4 rounded-3xl bg-gradient-to-br from-emerald-600 to-cyan-700 p-6 text-white md:grid-cols-[auto_1fr_auto]">
      <button
        type="button"
        [routerLink]="backLink"
        class="inline-flex items-center gap-2 rounded-full border border-white/30 px-4 py-2 text-sm font-semibold text-white transition hover:bg-white/15 focus:outline-none focus:ring-4 focus:ring-white/30"
      >
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Retour
      </button>

      <div class="flex min-w-0 items-center gap-4">
        <div class="flex h-16 w-16 shrink-0 items-center justify-center rounded-full bg-white/20 text-xl font-black">
          {{ ownerInitials }}
        </div>
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.18em] text-white/70">
            Galerie photos
          </p>
          <h1 class="text-3xl font-extrabold tracking-tight sm:text-5xl">
            {{ ownerName }}
          </h1>
          <p class="mt-2 max-w-2xl text-sm font-medium text-white/80 sm:text-base">
            {{ ownerAddress }}
          </p>
        </div>
      </div>

      <label
        for="galleryUpload"
        class="inline-flex cursor-pointer items-center justify-center gap-2 rounded-full bg-white px-5 py-3 text-sm font-bold text-slate-900 shadow-lg transition hover:bg-emerald-50 focus-within:ring-4 focus-within:ring-white/30"
      >
        <svg class="h-5 w-5 text-emerald-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m7-7H5" />
        </svg>
        {{ isUploading ? 'Ajout...' : 'Ajouter photo' }}
        <input
          id="galleryUpload"
          type="file"
          accept="image/*"
          class="hidden"
          [disabled]="isUploading"
          (change)="uploadPicture($any($event.target).files)"
        />
      </label>
    </header>

    <p *ngIf="uploadError" class="mx-auto mt-4 max-w-7xl rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700">
      {{ uploadError }}
    </p>

    <nav class="mt-6 grid gap-3 md:grid-cols-3" aria-label="Catégories de photos">
      <button
        *ngFor="let category of categories"
        type="button"
        class="relative rounded-xl border bg-white p-4 pr-14 text-left dark:bg-slate-900"
        [ngClass]="
          activeCategory === category.id
            ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-950'
            : 'border-slate-200 dark:border-slate-700'
        "
        (click)="setActiveCategory(category.id)"
      >
        <span class="block font-extrabold text-slate-900 dark:text-white">
          {{ category.label }}
        </span>
        <span class="mt-1 block text-xs font-semibold text-slate-500 dark:text-slate-300">
          {{ category.caption }}
        </span>
        <span class="absolute right-4 top-4 flex h-8 w-8 items-center justify-center rounded-full bg-slate-900 text-xs font-extrabold text-white">
          {{ countFor(category.id) }}
        </span>
      </button>
    </nav>

    <section class="mt-6">
      <div *ngIf="activePictures.length > 0; else emptyGallery" class="grid grid-cols-2 gap-2 sm:grid-cols-3 lg:grid-cols-5">
        <article
          *ngFor="let picture of activePictures; trackBy: trackByPictureId"
          class="relative aspect-square overflow-hidden rounded-xl bg-slate-200"
        >
          <button
            type="button"
            class="h-full w-full"
            (click)="openPicture(picture)"
          >
            <img
              [src]="picture.url"
              [alt]="categoryLabel(picture.category) + ' - ' + ownerName"
              class="h-full w-full object-cover"
              loading="lazy"
              decoding="async"
            />
          </button>
          <span class="absolute bottom-2 left-2 rounded-full bg-slate-900/75 px-2 py-1 text-[11px] font-bold text-white">
            {{ picture.uploadedAt | date:'dd/MM/yyyy' }}
          </span>
          <label class="absolute right-2 top-2 max-w-[calc(100%-1rem)] rounded-full bg-slate-900/75">
            <span class="sr-only">Reclasser la photo</span>
            <select
              class="max-w-28 border-0 bg-transparent px-2 py-1 text-xs font-extrabold text-white"
              [value]="picture.category"
              [disabled]="reclassifyingPictureId === picture.id"
              (change)="reclassifyPicture(picture, $any($event.target).value)"
            >
              <option
                *ngFor="let category of categories"
                [value]="category.id"
              >
                {{ category.label }}
              </option>
            </select>
          </label>
        </article>
      </div>

      <ng-template #emptyGallery>
        <div class="flex min-h-72 flex-col items-center justify-center rounded-2xl border border-dashed border-slate-300 bg-white text-slate-700 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100">
          <div class="mb-3 flex h-16 w-16 items-center justify-center rounded-full bg-emerald-50 text-emerald-700">
            <svg class="h-10 w-10" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5V8a2 2 0 012-2h3l1.6-2h4.8L16 6h3a2 2 0 012 2v8.5A2.5 2.5 0 0118.5 19h-13A2.5 2.5 0 013 16.5z" />
              <circle cx="12" cy="12" r="3.2" />
            </svg>
          </div>
          <h2 class="text-xl font-bold">Aucune photo {{ activeCategoryLabel() }}</h2>
        </div>
      </ng-template>
    </section>
  </section>
</main>

<div
  *ngIf="selectedPicture"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/85 p-4"
  (click)="closePicture()"
>
  <img
    [src]="selectedPicture.url"
    alt="Photo du client"
    class="max-h-[90vh] max-w-[94vw] rounded-xl object-contain shadow-2xl"
    decoding="async"
    (click)="$event.stopPropagation()"
  />
  <button
    type="button"
    class="absolute right-5 top-5 flex h-11 w-11 items-center justify-center rounded-full bg-white/15 text-3xl font-bold text-white transition hover:bg-white/25"
    aria-label="Fermer"
    (click)="closePicture()"
  >
    &times;
  </button>
</div>
